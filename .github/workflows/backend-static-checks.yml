name: backend-static-checks

on:
  push:
    paths:
      - .github/workflows/backend-static-checks.yml
      - backend/**
      - pyrightconfig.json
  pull_request:
    paths:
      - .github/workflows/backend-static-checks.yml
      - backend/**
      - pyrightconfig.json
  workflow_dispatch:

jobs:
  backend-pyright:
    name: Backend pyright
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: backend/.python-version

      - name: Install backend dependencies
        run: uv sync --project backend --extra dev --extra test --frozen

      - name: Run backend pyright for active application domains
        run: |
          uv run --project backend pyright -p pyrightconfig.json \
            backend/app/integrations/sustech/blackboard \
            backend/app/integrations/sustech/teaching_information_system \
            backend/app/copilot_runtime \
            backend/app/desktop_runtime

  business-domain-pytest:
    name: Business domain pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: backend/.python-version

      - name: Install backend dependencies
        run: uv sync --project backend --extra dev --extra test --frozen

      - name: Run Blackboard and TIS unit pytest
        run: |
          uv run --project backend python -m pytest -c backend/pyproject.toml -m "not live and not e2e" \
            backend/tests/unit/api \
            backend/tests/unit/data \
            backend/tests/unit/provider \
            backend/tests/unit/shared

  runtime-smoke-pytest:
    name: Runtime and smoke pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: backend/.python-version

      - name: Install backend dependencies
        run: uv sync --project backend --extra dev --extra test --frozen

      - name: Run runtime, desktop, and CI-safe integration smoke pytest
        run: |
          uv run --project backend python -m pytest -c backend/pyproject.toml -m "not live and not e2e" \
            backend/tests/unit/copilot_runtime \
            backend/tests/unit/desktop_runtime \
            backend/tests/integration/test_copilot_runtime_http.py

  command-tools-cross-platform:
    name: Command tools cross-platform pytest
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: backend/.python-version

      - name: Install backend dependencies
        run: uv sync --project backend --extra dev --extra test --frozen

      - name: Run command tools unit pytest
        run: uv run --project backend python -m pytest -c backend/pyproject.toml -m "not live and not e2e" backend/tests/unit/copilot_runtime/test_tool_registry.py -k "exposes_file_read_runtime_binding_metadata_and_executes or exposes_file_write_runtime_binding_metadata_and_executes or exposes_file_glob_runtime_binding_metadata_and_executes or exposes_file_grep_runtime_binding_metadata_and_executes or exposes_file_switch_root_runtime_binding_metadata_and_executes"
