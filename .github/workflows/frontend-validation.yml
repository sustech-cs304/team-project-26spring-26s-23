name: frontend-validation

on:
  push:
    paths:
      - .github/workflows/frontend-validation.yml
      - frontend-copilot/**
  pull_request:
    paths:
      - .github/workflows/frontend-validation.yml
      - frontend-copilot/**
  workflow_dispatch:

jobs:
  frontend-validation:
    name: Frontend validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-copilot

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-copilot/package-lock.json

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: backend/.python-version

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend typecheck
        run: npm run typecheck

      - name: Run frontend tests
        run: npm run test

      - name: Run frontend build
        run: npm run build

  desktop-packaging-smoke:
    name: Desktop packaging smoke
    runs-on: windows-latest
    defaults:
      run:
        working-directory: frontend-copilot

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-copilot/package-lock.json

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: backend/.python-version

      - name: Install frontend dependencies
        run: npm ci

      - name: Run desktop packaging smoke validation
        shell: pwsh
        run: |
          $env:CANDUE_BUNDLED_PYTHON_DIR = $env:pythonLocation
          $env:CANDUE_BUNDLED_PYTHON_EXECUTABLE_RELATIVE = 'python.exe'
          npm run package:desktop:smoke
